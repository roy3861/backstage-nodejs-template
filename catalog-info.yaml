# Used for Backstage Catalog Integration

apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: example-service
  description: An example Node.js backend service
  annotations:
    github.com/project-slug: my-org/example-service
    backstage.io/techdocs-ref: dir:.
  tags:
    - nodejs
    - typescript
    - postgresql
    - mongodb
    - kafka
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  system: example-service
  providesApis:
    - example-service-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: example-service-api
  description: REST API for example-service
spec:
  type: openapi
  lifecycle: production
  owner: platform-engineering
  definition: |
    openapi: "3.0.0"
    info:
      title: example-service API
      version: "1.0.0"
    paths:
      /health:
        get:
          summary: Health check
          responses:
            '200':
              description: OK
