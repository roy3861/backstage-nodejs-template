name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "${{ values.nodeVersion }}"
{% if values.artifactRegistry == 'ghcr' %}
  REGISTRY: ghcr.io
  IMAGE_NAME: {% raw %}${{ github.repository }}{% endraw %}
{% elif values.artifactRegistry == 'dockerhub' %}
  REGISTRY: docker.io
  IMAGE_NAME: {% raw %}${{ secrets.DOCKERHUB_USERNAME }}{% endraw %}/${{ values.name }}
{% elif values.artifactRegistry == 'ecr' %}
  REGISTRY: {% raw %}${{ secrets.AWS_ACCOUNT_ID }}{% endraw %}.dkr.ecr.{% raw %}${{ secrets.AWS_REGION }}{% endraw %}.amazonaws.com
  IMAGE_NAME: ${{ values.name }}
{% elif values.artifactRegistry == 'gcr' %}
  REGISTRY: gcr.io
  IMAGE_NAME: {% raw %}${{ secrets.GCP_PROJECT_ID }}{% endraw %}/${{ values.name }}
{% elif values.artifactRegistry == 'acr' %}
  REGISTRY: {% raw %}${{ secrets.ACR_LOGIN_SERVER }}{% endraw %}
  IMAGE_NAME: ${{ values.name }}
{% endif %}

jobs:
  # ────────────────────────────────────────────────────
  # 1. Lint, Typecheck, Test
  # ────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: {% raw %}${{ env.NODE_VERSION }}{% endraw %}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ────────────────────────────────────────────────────
  # 2. Security Scanning
  # ────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: {% raw %}${{ env.NODE_VERSION }}{% endraw %}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ────────────────────────────────────────────────────
  # 3. Build & Push Docker Image
  # ────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: {% raw %}${{ steps.meta.outputs.version }}{% endraw %}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

{% if values.artifactRegistry == 'ghcr' %}
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: {% raw %}${{ github.actor }}{% endraw %}
          password: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}
{% elif values.artifactRegistry == 'dockerhub' %}
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: {% raw %}${{ secrets.DOCKERHUB_USERNAME }}{% endraw %}
          password: {% raw %}${{ secrets.DOCKERHUB_TOKEN }}{% endraw %}
{% elif values.artifactRegistry == 'ecr' %}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: {% raw %}${{ secrets.AWS_ACCESS_KEY_ID }}{% endraw %}
          aws-secret-access-key: {% raw %}${{ secrets.AWS_SECRET_ACCESS_KEY }}{% endraw %}
          aws-region: {% raw %}${{ secrets.AWS_REGION }}{% endraw %}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
{% elif values.artifactRegistry == 'gcr' %}
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: {% raw %}${{ secrets.GCP_SA_KEY }}{% endraw %}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet
{% elif values.artifactRegistry == 'acr' %}
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: {% raw %}${{ secrets.ACR_LOGIN_SERVER }}{% endraw %}
          username: {% raw %}${{ secrets.ACR_USERNAME }}{% endraw %}
          password: {% raw %}${{ secrets.ACR_PASSWORD }}{% endraw %}
{% endif %}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: {% raw %}${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}{% endraw %}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: {% raw %}${{ steps.meta.outputs.tags }}{% endraw %}
          labels: {% raw %}${{ steps.meta.outputs.labels }}{% endraw %}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: {% raw %}${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest{% endraw %}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ────────────────────────────────────────────────────
  # 4. Package & Push Helm Chart
  # ────────────────────────────────────────────────────
  helm-package:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Helm Lint
        run: helm lint ./helm/${{ values.name }}

      - name: Package Helm chart
        run: helm package ./helm/${{ values.name }} --destination .helm-packages/

{% if values.artifactRegistry == 'ghcr' %}
      - name: Push Helm chart to GHCR
        run: |
          echo {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %} | helm registry login ghcr.io --username {% raw %}${{ github.actor }}{% endraw %} --password-stdin
          helm push .helm-packages/*.tgz oci://ghcr.io/{% raw %}${{ github.repository_owner }}{% endraw %}/charts
{% elif values.artifactRegistry == 'dockerhub' %}
      - name: Push Helm chart to Docker Hub
        run: |
          echo {% raw %}${{ secrets.DOCKERHUB_TOKEN }}{% endraw %} | helm registry login registry-1.docker.io --username {% raw %}${{ secrets.DOCKERHUB_USERNAME }}{% endraw %} --password-stdin
          helm push .helm-packages/*.tgz oci://registry-1.docker.io/{% raw %}${{ secrets.DOCKERHUB_USERNAME }}{% endraw %}
{% elif values.artifactRegistry == 'ecr' %}
      - name: Push Helm chart to ECR
        run: |
          aws ecr get-login-password --region {% raw %}${{ secrets.AWS_REGION }}{% endraw %} | helm registry login --username AWS --password-stdin {% raw %}${{ env.REGISTRY }}{% endraw %}
          helm push .helm-packages/*.tgz oci://{% raw %}${{ env.REGISTRY }}{% endraw %}
{% elif values.artifactRegistry == 'gcr' %}
      - name: Push Helm chart to GCR/Artifact Registry
        run: |
          gcloud auth print-access-token | helm registry login gcr.io --username oauth2accesstoken --password-stdin
          helm push .helm-packages/*.tgz oci://gcr.io/{% raw %}${{ secrets.GCP_PROJECT_ID }}{% endraw %}/charts
{% elif values.artifactRegistry == 'acr' %}
      - name: Push Helm chart to ACR
        run: |
          echo {% raw %}${{ secrets.ACR_PASSWORD }}{% endraw %} | helm registry login {% raw %}${{ secrets.ACR_LOGIN_SERVER }}{% endraw %} --username {% raw %}${{ secrets.ACR_USERNAME }}{% endraw %} --password-stdin
          helm push .helm-packages/*.tgz oci://{% raw %}${{ secrets.ACR_LOGIN_SERVER }}{% endraw %}/charts
{% endif %}
