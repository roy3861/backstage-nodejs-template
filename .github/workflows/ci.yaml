name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  # ──────────────────────────────────────────────────────────────────────
  # ARTIFACT_REGISTRY — Set to ONE of: ghcr | dockerhub | ecr | gcr | acr
  # This controls which registry login, Docker push, and Helm push steps run.
  # ──────────────────────────────────────────────────────────────────────
  ARTIFACT_REGISTRY: "ghcr"

jobs:
  # ────────────────────────────────────────────────────
  # 1. Lint, Typecheck, Test
  # ────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    container:
      image: node:20-trixie-slim
    steps:
      - uses: actions/checkout@v4

      - name: Pin npm version
        run: npm install -g npm@9.9.4

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ────────────────────────────────────────────────────
  # 2. Security Scanning
  # ────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: node:20-trixie-slim
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Pin npm version
        run: npm install -g npm@9.9.4

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: NPM Audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Install curl for Trivy
        run: |
          apt-get update
          apt-get install -y --no-install-recommends curl
          rm -rf /var/lib/apt/lists/*

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          version: 0.69.3
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ────────────────────────────────────────────────────
  # 3. Build & Push Docker Image
  # ────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Resolve registry & image name based on ARTIFACT_REGISTRY ──
      - name: Set registry and image name
        id: registry
        run: |
          case "${{ env.ARTIFACT_REGISTRY }}" in
            ghcr)
              echo "REGISTRY=ghcr.io" >> $GITHUB_OUTPUT
              echo "IMAGE_NAME=${{ github.repository }}" >> $GITHUB_OUTPUT
              ;;
            dockerhub)
              echo "REGISTRY=docker.io" >> $GITHUB_OUTPUT
              echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/example-service" >> $GITHUB_OUTPUT
              ;;
            ecr)
              echo "REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT
              echo "IMAGE_NAME=example-service" >> $GITHUB_OUTPUT
              ;;
            gcr)
              echo "REGISTRY=gcr.io" >> $GITHUB_OUTPUT
              echo "IMAGE_NAME=${{ secrets.GCP_PROJECT_ID }}/example-service" >> $GITHUB_OUTPUT
              ;;
            acr)
              echo "REGISTRY=${{ secrets.ACR_LOGIN_SERVER }}" >> $GITHUB_OUTPUT
              echo "IMAGE_NAME=example-service" >> $GITHUB_OUTPUT
              ;;
          esac

      # ── Registry Login (only the matching step runs) ──
      - name: Log in to GHCR
        if: env.ARTIFACT_REGISTRY == 'ghcr'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.ARTIFACT_REGISTRY == 'dockerhub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials
        if: env.ARTIFACT_REGISTRY == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.ARTIFACT_REGISTRY == 'ecr'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Authenticate to Google Cloud
        if: env.ARTIFACT_REGISTRY == 'gcr'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        if: env.ARTIFACT_REGISTRY == 'gcr'
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Log in to Azure Container Registry
        if: env.ARTIFACT_REGISTRY == 'acr'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Build, Tag & Push ──
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.REGISTRY }}/${{ steps.registry.outputs.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.registry.outputs.REGISTRY }}/${{ steps.registry.outputs.IMAGE_NAME }}:latest
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ────────────────────────────────────────────────────
  # 4. Package & Push Helm Chart
  # ────────────────────────────────────────────────────
  helm-package:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Helm Lint
        run: helm lint ./helm/example-service

      - name: Package Helm chart
        run: helm package ./helm/example-service --destination .helm-packages/

      # ── Helm Push (only the matching step runs) ──
      - name: Push Helm chart to GHCR
        if: env.ARTIFACT_REGISTRY == 'ghcr'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
          helm push .helm-packages/*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Push Helm chart to Docker Hub
        if: env.ARTIFACT_REGISTRY == 'dockerhub'
        run: |
          echo ${{ secrets.DOCKERHUB_TOKEN }} | helm registry login registry-1.docker.io --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          helm push .helm-packages/*.tgz oci://registry-1.docker.io/${{ secrets.DOCKERHUB_USERNAME }}

      - name: Push Helm chart to ECR
        if: env.ARTIFACT_REGISTRY == 'ecr'
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | helm registry login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          helm push .helm-packages/*.tgz oci://${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Push Helm chart to GCR
        if: env.ARTIFACT_REGISTRY == 'gcr'
        run: |
          gcloud auth print-access-token | helm registry login gcr.io --username oauth2accesstoken --password-stdin
          helm push .helm-packages/*.tgz oci://gcr.io/${{ secrets.GCP_PROJECT_ID }}/charts

      - name: Push Helm chart to ACR
        if: env.ARTIFACT_REGISTRY == 'acr'
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | helm registry login ${{ secrets.ACR_LOGIN_SERVER }} --username ${{ secrets.ACR_USERNAME }} --password-stdin
          helm push .helm-packages/*.tgz oci://${{ secrets.ACR_LOGIN_SERVER }}/charts
