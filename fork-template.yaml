apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: fork-nodejs-backend
  title: Fork Node.js Backend Application
  description: |
    Fork an existing Node.js backend repository (created from the nodejs-backend-template)
    into your GitHub organization. Useful for distributing the standard template to teams.
  tags:
    - nodejs
    - fork
    - typescript
spec:
  owner: platform-engineering
  type: service

  parameters:
    - title: Source Repository
      required:
        - sourceRepoUrl
      properties:
        sourceRepoUrl:
          title: Source Repository URL
          type: string
          description: |
            Full GitHub URL of the repository to fork.
            Example: https://github.com/my-org/nodejs-backend-template
          ui:autofocus: true

    - title: Fork Destination
      required:
        - targetOrg
        - targetRepoName
        - owner
      properties:
        targetOrg:
          title: Target GitHub Organization
          type: string
          description: GitHub org or user to fork into
        targetRepoName:
          title: New Repository Name
          type: string
          description: Name for the forked repository
          pattern: "^[a-z0-9-]+$"
        owner:
          title: Owner
          type: string
          description: Backstage team that owns this fork
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        description:
          title: Description
          type: string
          description: Optional description for the forked repo

    - title: Post-Fork Configuration
      properties:
        defaultBranch:
          title: Default Branch
          type: string
          description: Default branch name
          default: main
        makePrivate:
          title: Make Private
          type: boolean
          description: Set the forked repository to private
          default: true

  steps:
    - id: fork-repo
      name: Fork Repository
      action: github:repo:fork
      input:
        repoUrl: ${{ parameters.sourceRepoUrl }}
        targetOrg: ${{ parameters.targetOrg }}
        targetRepoName: ${{ parameters.targetRepoName }}

    - id: rename-and-configure
      name: Configure Fork
      action: github:repo:push
      input:
        repoUrl: github.com?owner=${{ parameters.targetOrg }}&repo=${{ parameters.targetRepoName }}
        defaultBranch: ${{ parameters.defaultBranch }}
        description: ${{ parameters.description }}
        repoVisibility: ${{ parameters.makePrivate | ternary('private', 'public') }}

    - id: register
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: https://github.com/${{ parameters.targetOrg }}/${{ parameters.targetRepoName }}/blob/${{ parameters.defaultBranch }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Forked Repository
        url: https://github.com/${{ parameters.targetOrg }}/${{ parameters.targetRepoName }}
      - title: Open in Backstage Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
