apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "example-service.fullname" . }}
  labels:
    {{- include "example-service.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: {{ .Values.service.port | quote }}
  LOG_LEVEL: "info"
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
