apiVersion: v1
kind: ConfigMap
metadata:
  name: {{`{{ include "`}}${{ values.name }}{{`.fullname" . }}`}}
  labels:
    {{`{{- include "`}}${{ values.name }}{{`.labels" . | nindent 4 }}`}}
data:
  NODE_ENV: "production"
  PORT: "${{ values.port }}"
  LOG_LEVEL: "info"
  {{`{{- range $key, $value := .Values.env }}`}}
  {{`{{ $key }}`}}: {{`{{ $value | quote }}`}}
  {{`{{- end }}`}}
