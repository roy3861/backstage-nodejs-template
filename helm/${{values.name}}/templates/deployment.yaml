apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{`{{ include "`}}${{ values.name }}{{`.fullname" . }}`}}
  labels:
    {{`{{- include "`}}${{ values.name }}{{`.labels" . | nindent 4 }}`}}
spec:
  {{`{{- if not .Values.autoscaling.enabled }}`}}
  replicas: {{`{{ .Values.replicaCount }}`}}
  {{`{{- end }}`}}
  selector:
    matchLabels:
      {{`{{- include "`}}${{ values.name }}{{`.selectorLabels" . | nindent 6 }}`}}
  template:
    metadata:
      annotations:
        checksum/config: {{`{{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}`}}
        {{`{{- with .Values.podAnnotations }}`}}
        {{`{{- toYaml . | nindent 8 }}`}}
        {{`{{- end }}`}}
      labels:
        {{`{{- include "`}}${{ values.name }}{{`.selectorLabels" . | nindent 8 }}`}}
    spec:
      {{`{{- with .Values.imagePullSecrets }}`}}
      imagePullSecrets:
        {{`{{- toYaml . | nindent 8 }}`}}
      {{`{{- end }}`}}
      serviceAccountName: {{`{{ include "`}}${{ values.name }}{{`.serviceAccountName" . }}`}}
      securityContext:
        {{`{{- toYaml .Values.podSecurityContext | nindent 8 }}`}}
      containers:
        - name: {{`{{ .Chart.Name }}`}}
          securityContext:
            {{`{{- toYaml .Values.securityContext | nindent 12 }}`}}
          image: "{{`{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}`}}"
          imagePullPolicy: {{`{{ .Values.image.pullPolicy }}`}}
          ports:
            - name: http
              containerPort: ${{ values.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{`{{ include "`}}${{ values.name }}{{`.fullname" . }}`}}
            - secretRef:
                name: {{`{{ include "`}}${{ values.name }}{{`.fullname" . }}`}}
                optional: true
          livenessProbe:
            {{`{{- toYaml .Values.livenessProbe | nindent 12 }}`}}
          readinessProbe:
            {{`{{- toYaml .Values.readinessProbe | nindent 12 }}`}}
          resources:
            {{`{{- toYaml .Values.resources | nindent 12 }}`}}
      {{`{{- with .Values.nodeSelector }}`}}
      nodeSelector:
        {{`{{- toYaml . | nindent 8 }}`}}
      {{`{{- end }}`}}
      {{`{{- with .Values.affinity }}`}}
      affinity:
        {{`{{- toYaml . | nindent 8 }}`}}
      {{`{{- end }}`}}
      {{`{{- with .Values.tolerations }}`}}
      tolerations:
        {{`{{- toYaml . | nindent 8 }}`}}
      {{`{{- end }}`}}
